name: Triad Sentinel CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This enables the manual 'Run workflow' button

jobs:
  # JOB 1: Automated Testing (Runs on every push/PR)
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          
      - name: Run Tests
        run: pytest tests/

  # JOB 2: Manual Deployment to Vertex AI (Runs ONLY on manual trigger)
  deploy:
    name: Deploy to Vertex AI Agent Engine
    runs-on: ubuntu-latest
    needs: test # Only runs if the 'test' job passes
    if: github.event_name == 'workflow_dispatch' # STRICT GATE: Only runs on manual click
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Agent
        run: |
          pip install google-adk
          adk deploy agent_engine --agent_dir=src --project_id=${{ secrets.GCP_PROJECT_ID }} --region=us-east1
